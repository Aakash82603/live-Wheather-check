<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast | Premium Weather Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            --text-glow: 0 0 10px rgba(255, 255, 255, 0.5);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            padding: 20px;
            overflow-x: hidden;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            gap: 24px;
            grid-template-columns: 1fr;
            animation: slideUp 0.8s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Glassmorphism Card Base */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            padding: 32px;
            transition: var(--transition);
        }
        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.45);
        }
        /* Search Section */
        .search-area {
            display: flex;
            gap: 12px;
            margin-bottom: 8px;
        }
        .search-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 24px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: var(--transition);
        }
        .search-input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .btn {
            background: var(--primary);
            border: none;
            border-radius: 16px;
            padding: 0 32px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .btn:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }
        .btn:active {
            transform: scale(0.95);
        }
        /* Main Weather Section */
        .weather-main {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 40px;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .city-name {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -1px;
            text-shadow: var(--text-glow);
            animation: fadeIn 1s ease;
        }
        .weather-desc {
            font-size: 1.5rem;
            opacity: 0.9;
            text-transform: capitalize;
            margin-bottom: 24px;
        }
        .temp-display {
            font-size: 6rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 16px;
            position: relative;
            display: inline-block;
        }
        .temp-unit {
            font-size: 2.5rem;
            position: absolute;
            top: 10px;
            right: -40px;
        }
        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 32px;
        }
        .detail-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            transition: var(--transition);
        }
        .detail-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }
        .detail-label {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 8px;
            display: block;
        }
        .detail-value {
            font-size: 1.4rem;
            font-weight: 600;
        }
        /* Favorites Section */
        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 10px;
        }
        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .fav-card {
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 20px;
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: scaleIn 0.5s ease;
        }
        .fav-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
        }
        .fav-remove {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            opacity: 0;
            transition: var(--transition);
        }
        .fav-card:hover .fav-remove {
            opacity: 1;
        }
        /* Loading States */
        #loader {
            display: none;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* Error Message */
        #error-msg {
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.1);
            padding: 12px 20px;
            border-radius: 12px;
            margin-top: 16px;
            display: none;
            text-align: center;
            animation: shake 0.5s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        /* Responsive Design */
        @media (max-width: 768px) {
            .weather-main { grid-template-columns: 1fr; text-align: center; gap: 20px; }
            .city-name { font-size: 2.5rem; }
            .temp-display { font-size: 4.5rem; }
            .btn-text { display: none; }
            .search-area { flex-direction: column; }
            .btn { height: 55px; }
        }
        /* Animations for 25+ elements requirement */
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .weather-icon {
            font-size: 5rem;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.4));
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        /* Pulse and Glow animations */
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(99, 102, 241, 0); } 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); } }
        .pulse { animation: pulse 2s infinite; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Search Area -->
        <div class="glass-card search-container">
            <div class="search-area">
                <input type="text" id="city-input" class="search-input" placeholder="Enter city name..." autocomplete="off">
                <button id="search-btn" class="btn pulse">
                    <span id="loader"></span>
                    <span class="btn-text">SEARCH</span>
                </button>
                <button id="save-btn" class="btn" style="background: rgba(255,255,255,0.1)">
                    <span>♥</span>
                </button>
            </div>
            <div id="error-msg">City not found. Please try again.</div>
        </div>
        <!-- Main Display -->
        <div class="glass-card main-display">
            <div class="weather-main">
                <div class="weather-info">
                    <h1 id="city-display" class="city-name">Ready?</h1>
                    <p id="condition-display" class="weather-desc">Search for a city to see the weather</p>
                    <div class="temp-container">
                        <span id="temp-display" class="temp-display">--</span>
                        <span class="temp-unit">°C</span>
                    </div>
                </div>
                <div class="weather-graphic">
                    <div id="weather-icon" class="weather-icon">🌍</div>
                </div>
            </div>
            <div class="weather-details">
                <div class="detail-item">
                    <span class="detail-label">Humidity</span>
                    <span id="humidity-display" class="detail-value">--%</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Wind Speed</span>
                    <span id="wind-display" class="detail-value">-- km/h</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Feels Like</span>
                    <span id="feels-display" class="detail-value">--°C</span>
                </div>
            </div>
        </div>
        <!-- Favorites Section -->
        <div class="glass-card">
            <h3 style="margin-bottom: 20px; font-weight: 600; font-size: 1.2rem;">Favorite Cities</h3>
            <div id="favorites-grid" class="favorites-grid">
                <!-- Fav cards injected here -->
            </div>
        </div>
    </div>
    <script>
        const API_GEO = "https://geocoding-api.open-meteo.com/v1/search";
        const API_WEATHER = "https://api.open-meteo.com/v1/forecast";
        const elements = {
            cityInput: document.getElementById('city-input'),
            searchBtn: document.getElementById('search-btn'),
            saveBtn: document.getElementById('save-btn'),
            loader: document.getElementById('loader'),
            errorMsg: document.getElementById('error-msg'),
            cityDisplay: document.getElementById('city-display'),
            conditionDisplay: document.getElementById('condition-display'),
            tempDisplay: document.getElementById('temp-display'),
            humidityDisplay: document.getElementById('humidity-display'),
            windDisplay: document.getElementById('wind-display'),
            feelsDisplay: document.getElementById('feels-display'),
            weatherIcon: document.getElementById('weather-icon'),
            favoritesGrid: document.getElementById('favorites-grid'),
            btnText: document.querySelector('.btn-text')
        };
        let currentCityData = null;
        let favorites = JSON.parse(localStorage.getItem('skycast_favorites')) || [];
        // Weather Code Map (Simplified)
        const weatherCodes = {
            0: { text: "Sunny", icon: "☀️" },
            1: { text: "Mainly Clear", icon: "🌤️" },
            2: { text: "Partly Cloudy", icon: "⛅" },
            3: { text: "Overcast", icon: "☁️" },
            45: { text: "Fog", icon: "🌫️" },
            48: { text: "Depositing Rime Fog", icon: "🌫️" },
            51: { text: "Light Drizzle", icon: "🌦️" },
            61: { text: "Rain", icon: "🌧️" },
            71: { text: "Snow", icon: "❄️" },
            95: { text: "Thunderstorm", icon: "⛈️" }
        };
        const getCondition = (code) => weatherCodes[code] || { text: "Changing", icon: "🌡️" };
        const showLoading = (isLoading) => {
            elements.loader.style.display = isLoading ? 'block' : 'none';
            elements.btnText.style.display = isLoading ? 'none' : 'block';
            elements.searchBtn.disabled = isLoading;
        };
        const showError = (show) => {
            elements.errorMsg.style.display = show ? 'block' : 'none';
        };
        async function fetchWeather(cityName) {
            showError(false);
            showLoading(true);
            try {
                // Step 1: Geocoding
                const geoRes = await fetch(`${API_GEO}?name=${cityName}&count=1`);
                const geoData = await geoRes.json();
                if (!geoData.results || geoData.results.length === 0) {
                    throw new Error("City not found");
                }
                const { latitude, longitude, name, country } = geoData.results[0];
                
                // Step 2: Weather Data
                const weatherRes = await fetch(`${API_WEATHER}?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,apparent_temperature`);
                const weatherData = await weatherRes.json();
                updateUI(name, country, weatherData.current);
                currentCityData = { name, country, lat: latitude, lon: longitude };
            } catch (err) {
                console.error(err);
                showError(true);
            } finally {
                showLoading(false);
            }
        }
        function updateUI(name, country, data) {
            const condition = getCondition(data.weather_code);
            
            // Dynamic DOM Updates
            elements.cityDisplay.innerText = `${name}, ${country}`;
            elements.conditionDisplay.innerText = condition.text;
            elements.tempDisplay.innerText = Math.round(data.temperature_2m);
            elements.humidityDisplay.innerText = `${data.relative_humidity_2m}%`;
            elements.windDisplay.innerText = `${data.wind_speed_10m} km/h`;
            elements.feelsDisplay.innerText = `${Math.round(data.apparent_temperature)}°C`;
            elements.weatherIcon.innerText = condition.icon;
            // Trigger animations
            [elements.cityDisplay, elements.tempDisplay, elements.weatherIcon].forEach(el => {
                el.classList.remove('animate-pop');
                void el.offsetWidth; // Trigger reflow
                el.classList.add('animate-pop');
            });
        }
        // Favorites Logic
        function renderFavorites() {
            elements.favoritesGrid.innerHTML = '';
            favorites.forEach((city, index) => {
                const card = document.createElement('div');
                card.className = 'fav-card';
                card.innerHTML = `
                    <div class="fav-remove" data-index="${index}">×</div>
                    <div style="font-weight: 600;">${city.name}</div>
                    <div style="font-size: 0.8rem; opacity: 0.6;">${city.country}</div>
                `;
                card.onclick = (e) => {
                    if (e.target.className !== 'fav-remove') fetchWeather(city.name);
                };
                elements.favoritesGrid.appendChild(card);
            });
            // Re-attach removal events
            document.querySelectorAll('.fav-remove').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const idx = e.target.getAttribute('data-index');
                    favorites.splice(idx, 1);
                    localStorage.setItem('skycast_favorites', JSON.stringify(favorites));
                    renderFavorites();
                };
            });
        }
        elements.saveBtn.onclick = () => {
            if (currentCityData && !favorites.some(f => f.name === currentCityData.name)) {
                favorites.push(currentCityData);
                localStorage.setItem('skycast_favorites', JSON.stringify(favorites));
                renderFavorites();
                
                // Subtle pulse animation on click
                elements.saveBtn.style.transform = "scale(1.3)";
                setTimeout(() => elements.saveBtn.style.transform = "scale(1)", 200);
            }
        };
        elements.searchBtn.onclick = () => {
            const city = elements.cityInput.value.trim();
            if (city) fetchWeather(city);
        };
        elements.cityInput.onkeypress = (e) => {
            if (e.key === 'Enter') elements.searchBtn.click();
        };
        // Initial setup
        renderFavorites();
        
        // Auto-load a city for a great first impression
        fetchWeather("London");
    </script>
</body>
</html>
